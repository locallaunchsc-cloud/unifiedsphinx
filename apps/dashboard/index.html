<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnifiedSphinx Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    header { background: #111; border-bottom: 1px solid #222; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .logo span { color: #a78bfa; }
    .badge { background: #1a1a2e; color: #a78bfa; border: 1px solid #a78bfa44; border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; }
    .card-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .card-value { font-size: 2rem; font-weight: 700; }
    .score-good { color: #34d399; }
    .score-warn { color: #fbbf24; }
    .score-bad { color: #f87171; }
    .card-sub { font-size: 0.8rem; color: #666; margin-top: 4px; }
    .section-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 16px; }
    .events-table { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #161616; color: #888; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; padding: 12px 16px; text-align: left; }
    td { padding: 12px 16px; border-top: 1px solid #1a1a1a; font-size: 0.85rem; }
    .decision-allow { color: #34d399; }
    .decision-alert { color: #fbbf24; }
    .decision-block { color: #f87171; }
    .risk-low { color: #34d399; }
    .risk-med { color: #fbbf24; }
    .risk-high { color: #f87171; }
    .pill { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-weight: 600; }
    .pill-allow { background: #34d39922; color: #34d399; }
    .pill-alert { background: #fbbf2422; color: #fbbf24; }
    .pill-block { background: #f8717122; color: #f87171; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
    input[type=text] { background: #161616; border: 1px solid #333; color: #e0e0e0; border-radius: 8px; padding: 8px 14px; font-size: 0.85rem; width: 260px; }
    button { background: #a78bfa; color: #0a0a0a; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #c4b5fd; }
    .empty { color: #555; text-align: center; padding: 32px; font-size: 0.9rem; }
    .refresh-note { color: #555; font-size: 0.75rem; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Unified<span>Sphinx</span></div>
    <div class="badge">Security Dashboard</div>
  </header>

  <div class="container">
    <div class="controls">
      <input type="text" id="siteIdInput" placeholder="Enter Site ID..." value="demo-site-1" />
      <button onclick="loadSite()">Load Site</button>
      <span class="refresh-note" id="lastRefresh"></span>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-label">Security Score</div>
        <div class="card-value" id="score">--</div>
        <div class="card-sub">0 = critical, 100 = clean</div>
      </div>
      <div class="card">
        <div class="card-label">Alerts</div>
        <div class="card-value score-warn" id="alerts">--</div>
        <div class="card-sub">Suspicious events flagged</div>
      </div>
      <div class="card">
        <div class="card-label">Blocked</div>
        <div class="card-value score-bad" id="blocked">--</div>
        <div class="card-sub">Attacks stopped</div>
      </div>
      <div class="card">
        <div class="card-label">Events (last 100)</div>
        <div class="card-value" id="total">--</div>
        <div class="card-sub">Total events recorded</div>
      </div>
    </div>

    <div class="section-title">Recent Events</div>
    <div class="events-table">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Type</th>
            <th>Path</th>
            <th>IP</th>
            <th>Risk</th>
            <th>Decision</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody id="eventsBody">
          <tr><td colspan="7" class="empty">Enter a Site ID and click Load Site</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3001';

    async function loadSite() {
      const siteId = document.getElementById('siteIdInput').value.trim();
      if (!siteId) return;

      try {
        const res = await fetch(API_URL + '/sites/' + siteId + '/status');
        const data = await res.json();

        const score = data.score || 0;
        const scoreEl = document.getElementById('score');
        scoreEl.textContent = score;
        scoreEl.className = 'card-value ' + (score >= 80 ? 'score-good' : score >= 50 ? 'score-warn' : 'score-bad');

        document.getElementById('alerts').textContent = data.alerts || 0;
        document.getElementById('blocked').textContent = data.blocked || 0;
        document.getElementById('total').textContent = (data.recentEvents || []).length;
        document.getElementById('lastRefresh').textContent = 'Last refresh: ' + new Date().toLocaleTimeString();

        renderEvents(data.recentEvents || []);
      } catch (e) {
        document.getElementById('eventsBody').innerHTML =
          '<tr><td colspan="7" class="empty">Could not connect to API. Is the server running?</td></tr>';
      }
    }

    function renderEvents(events) {
      const tbody = document.getElementById('eventsBody');
      if (!events.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">No events yet</td></tr>';
        return;
      }
      tbody.innerHTML = events.map(e => {
        const risk = e.riskScore || 0;
        const riskClass = risk >= 60 ? 'risk-high' : risk >= 30 ? 'risk-med' : 'risk-low';
        const dec = e.decision || 'allow';
        const reason = (e.reasons && e.reasons[0]) || '-';
        const time = new Date(e.timestamp).toLocaleTimeString();
        return '<tr>' +
          '<td>' + time + '</td>' +
          '<td>' + (e.type || '-') + '</td>' +
          '<td>' + (e.path || '/') + '</td>' +
          '<td>' + (e.ip || '-') + '</td>' +
          '<td class="' + riskClass + '">' + risk + '</td>' +
          '<td><span class="pill pill-' + dec + '">' + dec.toUpperCase() + '</span></td>' +
          '<td style="color:#666;font-size:0.78rem">' + reason + '</td>' +
          '</tr>';
      }).join('');
    }

    // Auto-refresh every 10 seconds
    setInterval(() => {
      const siteId = document.getElementById('siteIdInput').value.trim();
      if (siteId) loadSite();
    }, 10000);
  </script>
</body>
</html>
